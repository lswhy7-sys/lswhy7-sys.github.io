function sha256(str){var buf=new TextEncoder().encode(str);return crypto.subtle.digest('SHA-256',buf).then(function(hash){return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');});}
function checkPassword(){var input=document.getElementById('pw-input').value;var btn=document.getElementById('enter-btn');btn.textContent='...';btn.disabled=true;sha256(input).then(function(hash){if(hash===_h){try{var decoded=atob(_d);var bytes=new Uint8Array(decoded.length);for(var i=0;i<decoded.length;i++)bytes[i]=decoded.charCodeAt(i);var text=new TextDecoder('utf-8').decode(bytes);document.open();document.write(text);document.close();}catch(e){document.open();document.write(atob(_d));document.close();}}else{var inp=document.getElementById('pw-input');inp.classList.add('error');document.getElementById('error-msg').textContent='비밀번호가 올바르지 않습니다.';setTimeout(function(){inp.classList.remove('error');},400);btn.textContent='Enter';btn.disabled=false;inp.value='';inp.focus();}});}
